exclude: ^projects/
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
        args: [--line-length=88]

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        language: system
        types: [python]
        pass_filenames: false
        # non-blocking for now — pre-existing type debt across the repo (not just the share-tab
        # which feature 001 cleaned up). Surfacing findings is useful; gating on them isn't, until
        # the cleanup backlog reaches a clean state. Re-tighten by dropping `|| true`.
        entry: bash -c 'uv run pyright shaderbox || true'
        verbose: true
