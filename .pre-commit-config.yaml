exclude: ^projects/
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
        args: [--line-length=88]

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        language: system
        types: [python]
        pass_filenames: false
        # non-blocking for now — the repo has pre-existing type debt (the share-tab
        # hasattr-dispatch in ui.py). Surfacing it is useful; gating on it isn't, yet.
        # Re-tighten once the sticker-models refactor lands (todo.md). `|| true` keeps
        # the hook from failing the commit while still printing the findings.
        entry: bash -c 'uv run pyright shaderbox || true'
        verbose: true
